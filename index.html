<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>電卓ツール</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #e0e0e0; font-family: sans-serif; }
        .calculator { background-color: #5a8e7a; padding: 20px; border-radius: 10px; display: flex; gap: 10px; }
        .display { background: white; width: 150px; height: 300px; border: 2px solid #333; }
        .grid { display: grid; grid-template-columns: repeat(3, 60px); gap: 10px; }
        button { height: 50px; cursor: pointer; font-size: 18px; border-radius: 5px; border: none; background: #ccc; }
        .op { background: #999; }
        .equal { background: #777; color: white; }
    </style>
</head>
<body>

<div class="calculator">
    <div class="display" id="screen"></div>
    <div class="grid">
        <button onclick="clearAll()" style="grid-column: span 3;">AC</button>
        <button>7</button><button>8</button><button>9</button>
        <button>4</button><button>5</button><button>6</button>
        <button>1</button><button>2</button><button>3</button>
        <button>0</button><button>00</button><button class="op">-</button>
        <button class="op">÷</button><button class="op">×</button><button class="op">+</button>
        <button class="equal" style="grid-column: span 3;" onclick="calculate()">=</button>
    </div>
</div>

<script>
    const screen = document.getElementById('screen');
    function clearAll() { screen.innerText = ''; }
    function calculate() { try { screen.innerText = eval(screen.innerText.replace('×', '*').replace('÷', '/')); } catch { screen.innerText = 'Error'; } }
    document.querySelectorAll('button').forEach(btn => {
        if(btn.innerText.match(/[0-9]|[\+\-\*\/]/)) {
            btn.addEventListener('click', () => screen.innerText += btn.innerText);
        }
    });
</script>
</body>
</html>
