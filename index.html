<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>比較電卓</title>

<style>

body{
font-family:sans-serif;
background:#f3f3f3;
margin:0;
padding:10px;
}

h2{text-align:center;}

.main{
display:flex;
gap:8px;
}

.columns{
display:flex;
gap:5px;
flex:1;
}

.column{
background:white;
flex:1;
border-radius:10px;
padding:5px;
}

.row{
height:35px;
border-bottom:1px solid #ccc;
font-size:18px;
}

.row.active{
background:#ddd;
}

.total{
font-size:22px;
font-weight:bold;
text-align:center;
margin:8px;
}


.keypad{
width:130px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:5px;
}

button{
font-size:22px;
border-radius:8px;
border:none;
padding:12px 5px;
}


.mode{
margin:10px;
text-align:center;
}

</style>

</head>


<body>

<h2>比較電卓</h2>


<div class="mode">

<button onclick="mode='single'">
個別
</button>

<button onclick="mode='all'">
一括
</button>

</div>



<div class="main">


<div class="columns">


<div class="column">

<h3>A</h3>

<div id="col0"></div>

<div class="total" id="total0">
0
</div>

<button onclick="clearCol(0)">
AC
</button>

</div>




<div class="column">

<h3>B</h3>

<div id="col1"></div>

<div class="total" id="total1">
0
</div>

<button onclick="clearCol(1)">
AC
</button>

</div>




<div class="column">

<h3>C</h3>

<div id="col2"></div>

<div class="total" id="total2">
0
</div>

<button onclick="clearCol(2)">
AC
</button>

</div>


</div>





<div class="keypad">

<button onclick="input('7')">7</button>
<button onclick="input('8')">8</button>
<button onclick="input('9')">9</button>

<button onclick="input('4')">4</button>
<button onclick="input('5')">5</button>
<button onclick="input('6')">6</button>

<button onclick="input('1')">1</button>
<button onclick="input('2')">2</button>
<button onclick="input('3')">3</button>

<button onclick="input('0')">0</button>
<button onclick="input('00')">00</button>
<button onclick="calc()">=</button>

<button onclick="input('+')">+</button>
<button onclick="input('-')">-</button>
<button onclick="input('*')">*</button>
<button onclick="input('/')">/</button>

</div>


</div>





<script>


let data=[
Array(10).fill(""),
Array(10).fill(""),
Array(10).fill("")
];


let activeCol=0;
let activeRow=0;

let mode="single";



function draw(){


for(let c=0;c<3;c++){


let html="";


for(let r=0;r<10;r++){


html+=`

<div class="row ${activeCol==c&&activeRow==r?'active':''}"
onclick="selectCell(${c},${r})">

${data[c][r]}

</div>

`;

}


document.getElementById(
"col"+c
).innerHTML=html;


let sum=0;


for(let v of data[c]){

try{

if(v)
sum+=Function("return "+v)();

}catch{}

}


document.getElementById(
"total"+c
).innerHTML=sum;


}

}



function selectCell(c,r){

activeCol=c;
activeRow=r;

draw();

}




function input(v){


if(mode=="all"){

for(let c=0;c<3;c++){

data[c][activeRow]+=v;

}


}else{


data[activeCol][activeRow]+=v;


}


draw();

}





function calc(){


for(let c=0;c<3;c++){

for(let r=0;r<10;r++){


try{

if(data[c][r]){

data[c][r]=
Function("return "+data[c][r])()
.toString();

}


}catch{}


}

}


draw();

}





function clearCol(c){

data[c]=Array(10).fill("");

draw();

}



draw();


</script>


</body>
</html>
